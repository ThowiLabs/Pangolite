{{define "agent_credentials_modal"}}
<div class="modal-lite" id="agentCredentialsModal" role="dialog" aria-modal="true">
  <div class="modal-card agent-credentials-card">
    <div class="d-flex justify-content-between align-items-start gap-3 mb-3">
      <div>
        <h2 class="h5 text-white" id="agentCredentialsTitle">Credenciales del cliente</h2>
        <p class="text-muted mb-0" id="agentCredentialsMeta">Copia el token y los comandos ahora.</p>
      </div>
      <button class="btn btn-outline-secondary" type="button" onclick="closeAgentCredentials()"><i class="bi bi-x-lg"></i> Cerrar</button>
    </div>
    <div id="agentCredentialsBody"></div>
  </div>
</div>
{{end}}
