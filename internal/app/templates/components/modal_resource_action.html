{{define "resource_action_modal"}}
<div class="modal-lite" id="resourceActionModal" role="dialog" aria-modal="true"><div class="modal-card"><div class="d-flex justify-content-between align-items-start gap-3 mb-3"><div><h2 class="h5 text-white" id="resourceActionTitle">Acción del recurso</h2><p class="text-muted mb-0" id="resourceActionMeta">Elige cómo suspender o activar este recurso.</p></div><button class="btn btn-outline-secondary" onclick="closeResourceActionModal()"><i class="bi bi-x-lg"></i> Cerrar</button></div><input type="hidden" id="resourceActionId"><div class="grid grid-2"><div><label class="form-label">Acción rápida</label><select id="resourceActionMode" class="form-select"><option value="simple">Solo suspender con 403</option><option value="hidden">Oculto: responder como si no existiera</option><option value="template">Suspender usando plantilla existente</option><option value="custom">Suspender con HTML personalizado</option></select></div><div class="resource-action-html-only d-none"><label class="form-label">Código HTTP</label><select id="resourceActionStatus" class="form-select"><option value="403">403</option><option value="404">404</option><option value="200">200</option></select></div></div><div class="mt-3 resource-action-template-only d-none"><label class="form-label">Plantilla</label><select id="resourceActionTemplate" class="form-select"><option value="">Selecciona plantilla</option>{{range .SuspensionTemplates}}<option value="{{.ID}}">{{.Name}} ({{.ID}})</option>{{end}}</select><div class="form-text">Variables disponibles: <code>$nombredominio</code>, <code>$nombrerecurso</code>, <code>$proyecto</code>, <code>$codigo</code>, <code>$motivo</code>, <code>$fecha</code>.</div></div><div class="mt-3 resource-action-custom-only d-none"><label class="form-label">HTML personalizado</label><textarea id="resourceActionHTML" class="form-control font-mono" rows="8" placeholder="HTML sin scripts, iframes, formularios ni atributos on*."></textarea></div><div class="d-flex justify-content-between gap-2 mt-4"><button class="btn btn-outline-secondary" type="button" onclick="closeResourceActionModal()">Cancelar</button><button class="btn btn-outline-danger" type="button" onclick="applyResourceAction()"><i class="bi bi-pause-circle"></i> Aplicar suspensión</button></div></div></div>
{{end}}
