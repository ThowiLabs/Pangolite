{{define "template_manager_modal"}}
<div class="modal-lite" id="templateManagerModal" role="dialog" aria-modal="true"><div class="modal-card"><div class="d-flex justify-content-between align-items-start gap-3 mb-3"><div><h2 class="h5 text-white">Plantillas de suspensión</h2><p class="text-muted mb-0">Archivos físicos editables en el directorio de plantillas. Se validan para bloquear scripts y atributos peligrosos.</p></div><button class="btn btn-outline-secondary" onclick="closeTemplateManager()"><i class="bi bi-x-lg"></i> Cerrar</button></div><div class="grid grid-2"><div><label class="form-label">Plantilla existente</label><select id="templateManagerSelect" class="form-select"><option value="">Selecciona plantilla</option>{{range .SuspensionTemplates}}<option value="{{.ID}}">{{.Name}} ({{.ID}})</option>{{end}}</select></div><div><label class="form-label">Nueva plantilla</label><div class="input-group"><input id="templateNewId" class="form-control" placeholder="mi-plantilla"><button class="btn btn-outline-secondary" onclick="newTemplateDraft()" type="button">Crear borrador</button></div></div></div><div class="main-layout-note mt-3">Variables: <code>$nombredominio</code>, <code>$dominio</code>, <code>$nombrerecurso</code>, <code>$recurso</code>, <code>$proyecto</code>, <code>$codigo</code>, <code>$motivo</code>, <code>$fecha</code>.</div><textarea id="templateManagerHTML" class="form-control font-mono mt-3" rows="14"></textarea><div class="d-flex justify-content-end gap-2 mt-3"><button class="btn btn-outline-secondary" onclick="loadTemplateIntoEditor()" type="button"><i class="bi bi-arrow-clockwise"></i> Recargar</button><button class="btn btn-primary" onclick="saveTemplateFromEditor(this)" type="button"><i class="bi bi-save"></i> Guardar plantilla</button></div></div></div>
{{end}}
