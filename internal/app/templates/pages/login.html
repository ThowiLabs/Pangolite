{{define "page"}}{{template "auth_layout" .}}{{end}}
{{define "auth_content"}}
<div class="card auth-card w-100">
  <div class="card-body p-4 p-sm-5">
    {{template "auth_brand" .}}
    <div id="msg" class="alert d-none" role="alert"></div>
    <form id="loginForm" autocomplete="on">
      <div class="form-floating mb-3">
        <input class="form-control" id="username" name="username" type="text" autocomplete="username" placeholder="admin" required>
        <label for="username">Usuario</label>
      </div>
      <div class="form-floating mb-3">
        <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" placeholder="Contraseña" required>
        <label for="password">Contraseña</label>
      </div>
      <button class="btn btn-primary w-100 py-2" type="submit">Entrar</button>
    </form>
    <div id="resetEntry" class="auth-secondary-action d-none">
      <button id="showResetForm" type="button" class="auth-link-button">¿Olvidaste tu contraseña?</button>
    </div>
    <form id="resetRequestForm" class="auth-recovery d-none" autocomplete="on">
      <div class="text-muted small mb-2">Escribe el correo de recuperación de tu cuenta. Si existe, enviaremos un enlace temporal.</div>
      <div class="form-floating mb-3">
        <input class="form-control" id="resetEmail" type="email" autocomplete="email" placeholder="admin@midominio.com">
        <label for="resetEmail">Correo de recuperación</label>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-primary flex-fill" type="submit">Enviar enlace</button>
        <button class="btn btn-outline-light" type="button" id="cancelResetForm">Cancelar</button>
      </div>
    </form>
  </div>
  <div class="card-footer bg-transparent text-center small text-muted py-3">La contraseña temporal inicial vive en <code>/opt/pangolite/data/admin-password.txt</code>.</div>
</div>
{{end}}
