{{define "public_page"}}<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Recurso protegido</title>
  <link rel="stylesheet" href="/assets/app/public-resource.css">
</head>
<body>
  <main class="public-card public-card-sm">
    <div class="public-muted">{{.ResourceName}} · {{.Domain}}</div>
    <h1>Recurso protegido</h1>
    <p>{{.Message}}</p>
    <form method="post" action="{{.Action}}">
      <input class="public-input" type="password" name="pangolite_resource_password" autocomplete="current-password" placeholder="Contraseña" autofocus required>
      <button class="public-btn" type="submit">Entrar</button>
    </form>
  </main>
</body>
</html>{{end}}
